<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketplace de Ofertas</title><style>:root{--p:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}.top-banner{display:block;background:#071426;line-height:0}.top-banner img{display:block;width:100%;height:auto;max-height:520px;object-fit:cover}.hero{background:#111827;color:white;padding:28px 18px;text-align:center}.hero h1{margin:0 0 8px}.hero p{margin:0}.wrap{max-width:1050px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}.ad{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 28px #11182712;border:1px solid #e5e7eb}.ad>a.cover{display:block;color:inherit;text-decoration:none}.ad img{width:100%;height:180px;object-fit:cover}.gallery{position:relative}.gallery-main{display:block;width:100%;border:0;padding:0;background:none;cursor:zoom-in}.thumbs{display:flex;gap:7px;padding:9px;overflow-x:auto;background:#f8fafc}.thumb{flex:0 0 62px;border:2px solid transparent;border-radius:9px;padding:0;background:none;overflow:hidden}.thumb.active{border-color:var(--p)}.thumb img{height:52px;width:100%;object-fit:cover}.photo-hint{position:absolute;right:10px;bottom:10px;background:#111827dd;color:#fff;padding:6px 9px;border-radius:999px;font-size:12px}.lightbox{position:fixed;inset:0;z-index:9999;background:#000e;display:none;align-items:center;justify-content:center;padding:18px}.lightbox.open{display:flex}.lightbox img{max-width:96vw;max-height:88vh;object-fit:contain}.lightbox button{position:absolute;border:0;background:#fff;color:#111827;border-radius:999px;width:46px;height:46px;font-size:28px;font-weight:bold}.lb-close{right:18px;top:18px}.lb-prev{left:14px;top:50%}.lb-next{right:14px;top:50%}.lb-count{position:absolute;bottom:18px;color:#fff;font-weight:bold}.body{padding:17px}.tag{display:inline-block;background:#fff7ed;color:#9a3412;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold}.btn{display:inline-block;background:var(--p);color:#111827;text-decoration:none;padding:11px 14px;border-radius:11px;font-weight:bold}.muted{color:#6b7280}.empty{text-align:center;padding:40px}@media(max-width:600px){.top-banner img{min-height:210px;object-fit:cover}.hero{padding:22px 16px}.hero h1{font-size:30px}}</style></head><body><a class="top-banner" href="#ads" aria-label="Ver ofertas"><img src="banner-marketplace-paizao.png" alt="Acesse nosso site e veja as ofertas que preparamos para você"></a><header class="hero"><h1 id="title">Marketplace de Ofertas</h1><p>Promoções locais e parceiros selecionados.</p></header><main class="wrap"><div id="ads" class="grid"><div class="empty">Carregando ofertas...</div></div></main><div id="lightbox" class="lightbox" aria-hidden="true"><button class="lb-close" aria-label="Fechar">×</button><button class="lb-prev" aria-label="Anterior">‹</button><img alt="Foto ampliada"><button class="lb-next" aria-label="Próxima">›</button><div class="lb-count"></div></div><script src="firebase-config.js"></script><script type="module" src="marketplace.js?v=3.12.7.9.2"></script></body></html>
