<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marketplace de Ofertas</title>
<style>
:root{--p:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}.brand-stage{min-height:220px;width:100%;display:flex;align-items:center;justify-content:center;padding:18px 12px;overflow:hidden;background:linear-gradient(180deg,#fff 0%,#f4f5f7 100%);perspective:1200px;border-bottom:1px solid #e5e7eb}.brand-logo{display:none;width:min(94vw,760px);max-height:195px;object-fit:contain;transform-style:preserve-3d;filter:drop-shadow(0 15px 14px rgba(17,24,39,.30));animation:logoTurn 7s ease-in-out infinite}.brand-logo.visible{display:block}.brand-fallback{font-size:clamp(30px,8vw,64px);font-weight:900;text-align:center}.brand-fallback.hidden{display:none}@keyframes logoTurn{0%,100%{transform:rotateY(-18deg) rotateX(2deg) scale(.96)}50%{transform:rotateY(18deg) rotateX(-2deg) scale(1.04)}}.hero{background:#111827;color:#fff;padding:28px 18px;text-align:center}.hero h1{margin:0 0 8px;font-size:clamp(34px,7vw,64px);line-height:1.05}.hero p{font-size:clamp(18px,4vw,30px);margin:22px 0 4px}.wrap{max-width:1050px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}.ad{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 8px 28px #11182712;border:1px solid #e5e7eb}.ad img{width:100%;height:200px;object-fit:cover}.body{padding:17px}.tag{display:inline-block;background:#fff7ed;color:#9a3412;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold}.btn{display:inline-block;background:var(--p);color:#111827;text-decoration:none;padding:11px 14px;border-radius:11px;font-weight:bold}.muted{color:#6b7280}.empty{text-align:center;padding:42px 15px;font-size:18px}.error{color:#991b1b;background:#fee2e2;border:1px solid #fecaca;border-radius:12px}@media(max-width:600px){.brand-stage{min-height:190px}.brand-logo{max-height:165px}}@media(prefers-reduced-motion:reduce){.brand-logo{animation:none}}
</style>
</head>
<body>
<section class="brand-stage"><img id="marketLogo" class="brand-logo" alt="Logomarca da borracharia"><div id="marketLogoFallback" class="brand-fallback">Borracharia do Paizão</div></section>
<header class="hero"><h1 id="title">Marketplace de Ofertas</h1><p>Promoções locais e parceiros selecionados.</p></header>
<main class="wrap"><div id="ads" class="grid"><div class="empty">Carregando ofertas...</div></div></main>
<script src="firebase-config.js?v=312762"></script>
<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {getFirestore,collection,getDocs,doc,getDoc} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
const fallbackConfig={apiKey:"AIzaSyBRu4ytOf2sBsZOE2Ax2P8fvTmA6RccTZg",authDomain:"borracharia-do-paizao.firebaseapp.com",projectId:"borracharia-do-paizao",storageBucket:"borracharia-do-paizao.firebasestorage.app",messagingSenderId:"456347885525",appId:"1:456347885525:web:72d849f02901ab1e32a75c"};
const config=window.FIREBASE_CONFIG||window.firebaseConfig||fallbackConfig;
const tenant=(new URLSearchParams(location.search).get("loja")||"borracharia-do-paizao").toLowerCase().replace(/[^a-z0-9-]/g,"-");
const ads=document.querySelector('#ads');
const esc=v=>{const d=document.createElement('div');d.textContent=v??'';return d.innerHTML};
const date=v=>{const [y,m,d]=String(v||'').split('-').map(Number);return new Date(y,m-1,d)};
try{
 const app=initializeApp(config); const db=getFirestore(app);
 const tenantSnap=await getDoc(doc(db,'tenants',tenant)); const brand=tenantSnap.data()||{};
 document.documentElement.style.setProperty('--p',brand.primaryColor||'#f59e0b');
 document.querySelector('#title').textContent=`Ofertas — ${brand.businessName||'Marketplace'}`;
 const logo=document.querySelector('#marketLogo'),fallback=document.querySelector('#marketLogoFallback');
 if(brand.logoData){logo.src=brand.logoData;logo.classList.add('visible');fallback.classList.add('hidden')}else{fallback.textContent=brand.businessName||'Borracharia do Paizão'}
 const snap=await getDocs(collection(db,'tenants',tenant,'marketplaceCampaigns'));
 const today=new Date(); today.setHours(0,0,0,0);
 const list=snap.docs.map(x=>({id:x.id,...x.data()})).filter(c=>c.status==='active'&&c.paid!==false&&(!c.startDate||today>=date(c.startDate))&&(!c.endDate||today<=new Date(date(c.endDate).getTime()+86399999)));
 ads.innerHTML=list.map(c=>`<article class="ad">${c.imageData?`<img src="${c.imageData}" alt="${esc(c.title)}">`:''}<div class="body"><span class="tag">${c.kind==='external'?'Publicidade':'Oferta'}</span><h2>${esc(c.title)}</h2><p>${esc(c.message||'').replace(/\n/g,'<br>')}</p><p class="muted">Válido até ${esc(c.endDate||'')}</p>${c.link?`<a class="btn" href="${esc(c.link)}" target="_blank" rel="noopener">Ver oferta</a>`:''}</div></article>`).join('')||'<div class="empty">Nenhuma oferta ativa no momento.</div>';
}catch(e){console.error(e);ads.innerHTML=`<div class="empty error"><strong>Não foi possível carregar as ofertas.</strong><br><small>${esc(e?.message||'Erro de conexão com o Firebase')}</small></div>`}
</script>
</body>
</html>
