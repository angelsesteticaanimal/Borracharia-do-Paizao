<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Marketplace de Ofertas</title>
  <style>
    :root{--p:#f59e0b}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}

    .brand-stage{
      min-height:230px;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px 16px;
      overflow:hidden;
      background:linear-gradient(180deg,#ffffff 0%,#f6f7f9 100%);
      perspective:1200px;
      border-bottom:1px solid #e5e7eb;
    }
    .brand-logo{
      display:none;
      width:min(88vw,680px);
      max-height:205px;
      object-fit:contain;
      transform-style:preserve-3d;
      filter:drop-shadow(0 15px 14px rgba(17,24,39,.30));
      animation:logoTurn 7s ease-in-out infinite;
      will-change:transform;
    }
    .brand-logo.visible{display:block}
    .brand-fallback{font-size:clamp(28px,7vw,58px);font-weight:900;text-align:center;color:#111827}
    .brand-fallback.hidden{display:none}
    @keyframes logoTurn{
      0%,100%{transform:rotateY(-18deg) rotateX(2deg) scale(.96)}
      50%{transform:rotateY(18deg) rotateX(-2deg) scale(1.04)}
    }

    .hero{background:#111827;color:white;padding:28px 18px;text-align:center}
    .hero h1{margin:0 0 8px;font-size:clamp(34px,7vw,64px);line-height:1.05}
    .hero p{font-size:clamp(18px,4vw,30px);margin:22px 0 4px}
    .wrap{max-width:1050px;margin:auto;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}
    .ad{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 28px #11182712;border:1px solid #e5e7eb}
    .ad img{width:100%;height:180px;object-fit:cover}
    .body{padding:17px}
    .tag{display:inline-block;background:#fff7ed;color:#9a3412;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold}
    .btn{display:inline-block;background:var(--p);color:#111827;text-decoration:none;padding:11px 14px;border-radius:11px;font-weight:bold}
    .muted{color:#6b7280}
    .empty{text-align:center;padding:40px}

    @media (max-width:600px){
      .brand-stage{min-height:195px;padding:15px 10px}
      .brand-logo{width:94vw;max-height:175px}
    }
    @media (prefers-reduced-motion:reduce){.brand-logo{animation:none}}
  </style>
</head>
<body>
  <section class="brand-stage" aria-label="Logomarca da borracharia">
    <img id="marketLogo" class="brand-logo" alt="Logomarca da borracharia">
    <div id="marketLogoFallback" class="brand-fallback">Borracharia do Paizão</div>
  </section>

  <header class="hero">
    <h1 id="title">Marketplace de Ofertas</h1>
    <p>Promoções locais e parceiros selecionados.</p>
  </header>

  <main class="wrap">
    <div id="ads" class="grid"><div class="empty">Carregando ofertas...</div></div>
  </main>

  <script src="firebase-config.js"></script>
  <script type="module" src="marketplace.js?v=3.12.7.6.1"></script>
</body>
</html>
