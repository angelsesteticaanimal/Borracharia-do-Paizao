<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketplace de Ofertas</title><style>:root{--p:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}.hero{background:#111827;color:white;padding:28px 18px;text-align:center}.hero h1{margin:0 0 8px}.wrap{max-width:1050px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}.ad{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 28px #11182712;border:1px solid #e5e7eb}.ad img{width:100%;height:180px;object-fit:cover}.body{padding:17px}.tag{display:inline-block;background:#fff7ed;color:#9a3412;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold}.btn{display:inline-block;background:var(--p);color:#111827;text-decoration:none;padding:11px 14px;border-radius:11px;font-weight:bold}.muted{color:#6b7280}.empty{text-align:center;padding:40px}</style></head><body><header class="hero"><h1 id="title">Marketplace de Ofertas</h1><p>Promoções locais e parceiros selecionados.</p></header><main class="wrap"><div id="ads" class="grid"><div class="empty">Carregando ofertas...</div></div></main><script src="firebase-config.js"></script><script type="module" src="marketplace.js"></script></body></html>
